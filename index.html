<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Website | Blog & Newsletter</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #292929; --text-color: #292929; --gray: #757575; }
        body { font-family: 'Inter', sans-serif; color: var(--text-color); margin: 0; line-height: 1.6; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header { padding: 25px 0; border-bottom: 1px solid #eee; margin-bottom: 50px; }
        .logo { font-weight: 700; font-size: 24px; text-decoration: none; color: black; }

        /* Article Preview */
        article { margin-bottom: 60px; cursor: pointer; }
        h1 { font-family: 'Lora', serif; font-size: 32px; margin-bottom: 10px; }
        p.excerpt { font-size: 18px; color: var(--gray); margin-bottom: 15px; }
        .meta { font-size: 14px; color: var(--gray); }

        /* Newsletter Box */
        .newsletter { background: #f9f9f9; padding: 40px; border-radius: 8px; margin-top: 80px; text-align: center; }
        input[type="email"] { padding: 10px; width: 60%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: black; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="container">
        <a href="#" class="logo">World Website</a>
    </div>
</header>

<main class="container">
    <article>
        <div class="meta">18 Mars 2026 • 5 min de lecture</div>
        <h1>Bienvenue sur World Website</h1>
        <p class="excerpt">Découvrez notre vision pour un partage d'idées clair et minimaliste, inspiré par les meilleures plateformes de lecture.</p>
        <div class="meta">#Technologie #Futur</div>
    </article>

    <section class="newsletter">
        <h2>Restez informé</h2>
        <p>Inscrivez-vous pour recevoir nos articles directement par mail.</p>
        <form>
            <input type="email" placeholder="Votre adresse email..." required>
            <button type="submit">S'abonner</button>
        </form>
    </section>
</main>

</body>
</html>
